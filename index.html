
<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <!-- HEADER: Intentamos con la ruta corta -->
    <header class="header">
        <div class="logo">
            <!-- Quitamos la carpeta para probar si el archivo está en la raíz o en una subcarpeta -->
            <img src="logo.png" onerror="this.src='público/logo/logo.png'">
            <div class="logo-text">
                <h1>FARC-EP</h1>
                <p>FRENTE 36</p>
                <span>Yeferson Martinez</span>
            </div>
        </div>
        <button class="menu-btn" id="menu-btn">☰</button>
        <nav class="nav" id="nav">
            <a data-section="inicio">Inicio</a>
            <a data-section="comunicados">Comunicados</a>
            <a data-section="mujeres">Mujeres</a>
            <a data-section="galeria">Galería</a>
            <a data-section="Musica">Música</a>
            <a data-section="Videos">Videos</a>
            <a data-section="blog">Blog</a>
            <a data-section="recomendados">Recomendados</a>
        </nav>
    </header>

    <!-- INICIO: Fondo -->
    <section class="section active" id="inicio">
        <div class="hero">
            <img src="foto1.jpg" class="hero-img" onerror="this.src='público/imagenes/foto1.jpg'">
            <div class="overlay"></div>
            <div class="hero-content">
                <h1>FARC-EP FRENTE 36</h1>
                <h2 class="sub-hero">Yeferson Martinez</h2>
                <p>Memoria histórica, territorio, cultura y procesos comunitarios.</p>
            </div>
        </div>
    </section>

    <!-- Secciones reducidas para que no ocupen espacio -->
    <section class="section" id="comunicados"><div class="internal-page"><h2 class="page-title">COMUNICADOS</h2></div></section>
    <section class="section" id="mujeres"><div class="internal-page"><h2 class="page-title">MUJERES</h2></div></section>
    <section class="section" id="galeria"><div class="internal-page"><h2 class="page-title">GALERÍA</h2></div></section>
    <section class="section" id="Musica"><div class="internal-page"><h2 class="page-title">MÚSICA</h2></div></section>
    <section class="section" id="Videos"><div class="internal-page"><h2 class="page-title">VIDEOS</h2></div></section>
    <section class="section" id="blog"><div class="internal-page"><h2 class="page-title">BLOG</h2></div></section>
    <section class="section" id="recomendados"><div class="internal-page"><h2 class="page-title">RECOMENDADOS</h2></div></section>

    <script src="js/app.js"></script>
